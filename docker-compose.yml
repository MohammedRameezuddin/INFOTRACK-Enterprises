version: '3.8'
services:
  api:
    build: ./backend/api
    ports:
      - '3000:3000'
    volumes:
      - ./backend/api:/app
    environment:
      - NODE_ENV=development

  ai:
    build: ./backend/ai
    ports:
      - '8000:8000'
    volumes:
      - ./backend/ai:/app

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: infotrack
      POSTGRES_PASSWORD: infotrack
      POSTGRES_DB: infotrack
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  pgdata:
